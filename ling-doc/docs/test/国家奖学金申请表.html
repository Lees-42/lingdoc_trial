<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>国家奖学金申请表</title>
  <style>
    body { font-family: "Microsoft YaHei", SimSun, serif; margin: 40px; background: #f5f5f5; }
    .form-container { max-width: 800px; margin: 0 auto; background: #fff; padding: 40px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h1 { text-align: center; font-size: 24px; margin-bottom: 30px; letter-spacing: 4px; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { border: 1px solid #333; padding: 10px 12px; text-align: left; vertical-align: middle; }
    th { background: #f0f0f0; font-weight: normal; width: 120px; }
    .header-row th { text-align: center; background: #e8e8e8; font-weight: bold; }
    .blank { color: #ccc; font-style: italic; }
    .photo-cell { width: 120px; height: 150px; text-align: center; vertical-align: middle; }
    .signature-line { border-bottom: 1px solid #333; display: inline-block; width: 120px; margin: 0 8px; }
    .date-row td { text-align: right; padding-right: 40px; }
    .full-width { width: 100%; }
  </style>
</head>
<body>
  <div class="form-container">
    <h1>国家奖学金申请表</h1>
    <table>
      <tr>
        <td rowspan="5" class="photo-cell">贴照片处<br><span class="blank">（一寸免冠）</span></td>
        <th>姓名</th>
        <td class="blank">[待填写]</td>
        <th>性别</th>
        <td class="blank">[待填写]</td>
      </tr>
      <tr>
        <th>出生年月</th>
        <td class="blank">[待填写]</td>
        <th>民族</th>
        <td class="blank">[待填写]</td>
      </tr>
      <tr>
        <th>政治面貌</th>
        <td class="blank">[待填写]</td>
        <th>学号</th>
        <td class="blank">[待填写]</td>
      </tr>
      <tr>
        <th>院系</th>
        <td class="blank">[待填写]</td>
        <th>专业</th>
        <td class="blank">[待填写]</td>
      </tr>
      <tr>
        <th>年级</th>
        <td class="blank">[待填写]</td>
        <th>入学时间</th>
        <td class="blank">[待填写]</td>
      </tr>
      <tr class="header-row">
        <th colspan="5">学业成绩情况</th>
      </tr>
      <tr>
        <th>必修课成绩</th>
        <td colspan="2" class="blank">[待填写]</td>
        <th>综合排名</th>
        <td class="blank">[待填写]</td>
      </tr>
      <tr>
        <th>英语水平</th>
        <td colspan="2" class="blank">[待填写]</td>
        <th>计算机水平</th>
        <td class="blank">[待填写]</td>
      </tr>
      <tr class="header-row">
        <th colspan="5">获奖情况</th>
      </tr>
      <tr>
        <th>奖项名称</th>
        <th>获奖等级</th>
        <th>颁奖单位</th>
        <th colspan="2">获奖时间</th>
      </tr>
      <tr>
        <td class="blank">[待填写]</td>
        <td class="blank">[待填写]</td>
        <td class="blank">[待填写]</td>
        <td colspan="2" class="blank">[待填写]</td>
      </tr>
      <tr class="header-row">
        <th colspan="5">申请理由</th>
      </tr>
      <tr>
        <td colspan="5" style="height: 120px;" class="blank">[待填写：请详细陈述申请理由，不少于200字]</td>
      </tr>
      <tr class="header-row">
        <th colspan="5">推荐意见</th>
      </tr>
      <tr>
        <td colspan="5" style="height: 80px;" class="blank">[待填写：辅导员/导师推荐意见]</td>
      </tr>
      <tr>
        <td colspan="5" class="date-row">
          推荐人签名：<span class="signature-line"></span>
          日期：<span class="blank">[待填写]</span>
        </td>
      </tr>
    </table>
  </div>
</body>
</html>
