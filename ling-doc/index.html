<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <!-- 老式兼容标签, 意思是尽量用最新内核渲染 -->
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <!-- 一些国产双核浏览器的提示，优先用 WebKit 内核 -->
  <meta name="renderer" content="webkit">
  <!-- 更现代的响应式设计标签，适用于移动设备 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.ico">
  <!-- Vite 构建时替换占位符，通常来自环境变量（比如 .env 里的应用名） -->
  <title>%VITE_APP_TITLE%</title>
  <script type="module">
    import logoUrl from '/src/assets/logo/logo.png'

    const link = document.querySelector("link[rel~='icon']") || document.createElement('link')
    link.rel = 'icon'
    link.href = logoUrl
    document.head.appendChild(link)
  </script>
  <!--[if lt IE 11]><script>window.location.href='/html/ie.html';</script><![endif]-->
  <!-- 兼容性提示，IE11以下浏览器会被重定向到一个专门的提示页面 -->
  <style>
    /* 全局样式：设置html、body和#app的高度为100%，去除边距和内边距，确保页面全屏显示 */
    html,
    body,
    #app {
      height: 100%;
      margin: 0px;
      padding: 0px;
    }

    /* Chrome Frame提示样式：用于显示浏览器兼容性提示的背景和颜色 */
    .chromeframe {
      margin: 0.2em 0;
      background: #ccc;
      color: #000;
      padding: 0.2em 0;
    }

    /* 加载器包装器：固定定位覆盖整个页面，用于显示加载动画 */
    #loader-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 999999;
    }

    /* 加载器主体：圆形旋转加载动画，位于页面中心 */
    #loader {
      display: block;
      position: relative;
      left: 50%;
      top: 50%;
      width: 150px;
      height: 150px;
      margin: -75px 0 0 -75px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: #FFF;
      -webkit-animation: spin 2s linear infinite;
      -ms-animation: spin 2s linear infinite;
      -moz-animation: spin 2s linear infinite;
      -o-animation: spin 2s linear infinite;
      animation: spin 2s linear infinite;
      z-index: 1001;
    }

    /* 加载器内圈伪元素：添加多层旋转效果 */
    #loader:before {
      content: "";
      position: absolute;
      top: 5px;
      left: 5px;
      right: 5px;
      bottom: 5px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: #FFF;
      -webkit-animation: spin 3s linear infinite;
      -moz-animation: spin 3s linear infinite;
      -o-animation: spin 3s linear infinite;
      -ms-animation: spin 3s linear infinite;
      animation: spin 3s linear infinite;
    }

    /* 加载器最内圈伪元素：添加最内层旋转效果 */
    #loader:after {
      content: "";
      position: absolute;
      top: 15px;
      left: 15px;
      right: 15px;
      bottom: 15px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: #FFF;
      -moz-animation: spin 1.5s linear infinite;
      -o-animation: spin 1.5s linear infinite;
      -ms-animation: spin 1.5s linear infinite;
      -webkit-animation: spin 1.5s linear infinite;
      animation: spin 1.5s linear infinite;
    }

    /* WebKit浏览器旋转动画关键帧：定义旋转从0度到360度的动画 */
    @-webkit-keyframes spin {
      0% {
        -webkit-transform: rotate(0deg);
        -ms-transform: rotate(0deg);
        transform: rotate(0deg);
      }

      100% {
        -webkit-transform: rotate(360deg);
        -ms-transform: rotate(360deg);
        transform: rotate(360deg);
      }
    }

    /* 标准旋转动画关键帧：兼容所有浏览器的旋转动画 */
    @keyframes spin {
      0% {
        -webkit-transform: rotate(0deg);
        -ms-transform: rotate(0deg);
        transform: rotate(0deg);
      }

      100% {
        -webkit-transform: rotate(360deg);
        -ms-transform: rotate(360deg);
        transform: rotate(360deg);
      }
    }

    /* 加载器部分样式：左右两侧的背景色块，用于加载动画效果 */
    #loader-wrapper .loader-section {
      position: fixed;
      top: 0;
      width: 51%;
      height: 100%;
      background: #7171C6;
      z-index: 1000;
      -webkit-transform: translateX(0);
      -ms-transform: translateX(0);
      transform: translateX(0);
    }

    /* 左侧加载器部分：定位在页面左侧 */
    #loader-wrapper .loader-section.section-left {
      left: 0;
    }

    /* 右侧加载器部分：定位在页面右侧 */
    #loader-wrapper .loader-section.section-right {
      right: 0;
    }

    /* 加载完成后左侧部分的动画：向左滑动消失 */
    .loaded #loader-wrapper .loader-section.section-left {
      -webkit-transform: translateX(-100%);
      -ms-transform: translateX(-100%);
      transform: translateX(-100%);
      -webkit-transition: all 0.7s 0.3s cubic-bezier(0.645, 0.045, 0.355, 1.000);
      transition: all 0.7s 0.3s cubic-bezier(0.645, 0.045, 0.355, 1.000);
    }

    /* 加载完成后右侧部分的动画：向右滑动消失 */
    .loaded #loader-wrapper .loader-section.section-right {
      -webkit-transform: translateX(100%);
      -ms-transform: translateX(100%);
      transform: translateX(100%);
      -webkit-transition: all 0.7s 0.3s cubic-bezier(0.645, 0.045, 0.355, 1.000);
      transition: all 0.7s 0.3s cubic-bezier(0.645, 0.045, 0.355, 1.000);
    }

    /* 加载完成后加载器的淡出效果 */
    .loaded #loader {
      opacity: 0;
      -webkit-transition: all 0.3s ease-out;
      transition: all 0.3s ease-out;
    }

    /* 加载完成后整个加载器包装器的隐藏动画：向上滑动并隐藏 */
    .loaded #loader-wrapper {
      visibility: hidden;
      -webkit-transform: translateY(-100%);
      -ms-transform: translateY(-100%);
      transform: translateY(-100%);
      -webkit-transition: all 0.3s 1s ease-out;
      transition: all 0.3s 1s ease-out;
    }

    /* 无JavaScript时的加载器隐藏：当浏览器不支持JS时隐藏加载器 */
    .no-js #loader-wrapper {
      display: none;
    }

    /* 无JavaScript时的标题样式：设置标题颜色 */
    .no-js h1 {
      color: #222222;
    }

    /* 加载标题样式：显示在加载器上的文字，居中显示 */
    #loader-wrapper .load_title {
      font-family: 'Open Sans';
      color: #FFF;
      font-size: 19px;
      width: 100%;
      text-align: center;
      z-index: 9999999999999;
      position: absolute;
      top: 60%;
      opacity: 1;
      line-height: 30px;
    }

    /* 加载标题中的span样式：设置子元素的字体样式和透明度 */
    #loader-wrapper .load_title span {
      font-weight: normal;
      font-style: italic;
      font-size: 13px;
      color: #FFF;
      opacity: 0.5;
    }
  </style>
</head>

<body>
  <div id="app">
    <div id="loader-wrapper">
      <div id="loader"></div>
      <div class="loader-section section-left"></div>
      <div class="loader-section section-right"></div>
      <div class="load_title">正在加载灵档，请耐心等待...</div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
