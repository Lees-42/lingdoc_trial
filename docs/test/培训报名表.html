<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>员工技能培训报名表</title>
  <style>
    body { font-family: "Microsoft YaHei", SimSun, serif; margin: 40px; background: #f5f5f5; }
    .form-container { max-width: 650px; margin: 0 auto; background: #fff; padding: 40px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h1 { text-align: center; font-size: 22px; margin-bottom: 8px; }
    .sub-title { text-align: center; font-size: 13px; color: #666; margin-bottom: 25px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { border: 1px solid #333; padding: 10px 12px; text-align: left; vertical-align: middle; }
    th { background: #f5f5f5; width: 100px; font-weight: normal; }
    .blank { color: #ccc; font-style: italic; }
    .radio-group { display: flex; gap: 20px; }
    .checkbox-group { display: flex; flex-wrap: wrap; gap: 12px; }
    .footer { margin-top: 30px; display: flex; justify-content: space-between; font-size: 13px; }
    .footer-item { display: flex; align-items: center; gap: 8px; }
    .line { border-bottom: 1px solid #333; display: inline-block; width: 100px; }
  </style>
</head>
<body>
  <div class="form-container">
    <h1>员工技能培训报名表</h1>
    <div class="sub-title">2026年度春季培训班 · 报名截止日期：2026-05-31</div>
    <table>
      <tr>
        <th>姓名</th>
        <td class="blank">[待填写]</td>
        <th>性别</th>
        <td class="blank">[待填写]</td>
      </tr>
      <tr>
        <th>身份证号</th>
        <td colspan="3" class="blank">[待填写]</td>
      </tr>
      <tr>
        <th>联系电话</th>
        <td class="blank">[待填写]</td>
        <th>电子邮箱</th>
        <td class="blank">[待填写]</td>
      </tr>
      <tr>
        <th>所属部门</th>
        <td class="blank">[待填写]</td>
        <th>现任岗位</th>
        <td class="blank">[待填写]</td>
      </tr>
      <tr>
        <th>入职日期</th>
        <td class="blank">[待填写]</td>
        <th>工作年限</th>
        <td class="blank">[待填写]</td>
      </tr>
      <tr>
        <th>学历</th>
        <td class="blank">[待填写]</td>
        <th>毕业院校</th>
        <td class="blank">[待填写]</td>
      </tr>
      <tr>
        <th>报名课程</th>
        <td colspan="3" class="blank">[待填写：请填写课程名称]</td>
      </tr>
      <tr>
        <th>培训时间偏好</th>
        <td colspan="3" class="blank">[待填写：工作日/周末/均可]</td>
      </tr>
      <tr>
        <th>培训目的</th>
        <td colspan="3" style="height: 80px;" class="blank">[待填写：请简述参加培训的目的和期望收获]</td>
      </tr>
      <tr>
        <th>过往培训经历</th>
        <td colspan="3" style="height: 60px;" class="blank">[待填写：如有相关培训经历请简述]</td>
      </tr>
      <tr>
        <th>紧急联系人</th>
        <td class="blank">[待填写]</td>
        <th>紧急联系电话</th>
        <td class="blank">[待填写]</td>
      </tr>
    </table>
    <div class="footer">
      <div class="footer-item">
        申请人签字：<span class="line"></span>
      </div>
      <div class="footer-item">
        申请日期：<span class="blank">[待填写]</span>
      </div>
    </div>
  </div>
</body>
</html>
